<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surya Prasath</title>

<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#021c1e,#0f3d3e);
  color:white;
}

/* HERO */
.hero {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:60px;
  flex-wrap:wrap;
}

.hero span { color:#00e6c3; }

.buttons button {
  margin:10px 10px 0 0;
  padding:12px 20px;
  border-radius:25px;
  cursor:pointer;
}

.primary {background:#00e6c3;border:none;}
.outline {border:1px solid #00e6c3;background:transparent;color:white;}

.hero img {
  width:240px;
  border-radius:20px;
  border:2px solid #00e6c3;
  box-shadow:0 0 20px rgba(0,255,200,0.5);
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
  padding:40px;
}

/* GLASS */
.glass {
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  padding:25px;
  border-radius:20px;
  backdrop-filter: blur(10px);
  transition:0.3s;
  cursor:pointer;
}

.glass:hover { transform:translateY(-8px); }

/* TAGS */
.tag {
  display:inline-block;
  padding:8px 15px;
  margin:5px;
  border-radius:20px;
  background:#00e6c3;
  color:black;
}

/* POPUP */
#overlay {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup {
  width:400px;
  background: rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.2);
}

/* CONTACT */
.contact { padding:40px; }

input, textarea {
  width:100%;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

/* MOBILE */
@media(max-width:768px){
  .hero {flex-direction:column;text-align:center;}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div data-aos="fade-right">
    <h3>From Idea to <span>Execution</span></h3>
    <h1>SURYA PRASATH</h1>
    <p>Store Manager | Blinkit</p>

    <div class="buttons">
      <button class="primary" onclick="scrollToProjects()">View Projects</button>
      <button class="outline" onclick="scrollToContact()">Contact</button>
      <a href="resume.docx" download>
        <button class="primary">Download Resume</button>
      </a>
    </div>
  </div>

  <img src="profile.jpg" data-aos="fade-left">
</section>

<!-- ABOUT -->
<section class="grid">
  <div class="glass" data-aos="fade-up">
    <h2>About Me</h2>
    <p>Store Manager at Blinkit with experience in operations, inventory and quick commerce execution.</p>
  </div>

  <div class="glass" data-aos="fade-up">
    <h2>Tech Stack</h2>
    <span class="tag">Excel</span>
    <span class="tag">Google Sheets</span>
    <span class="tag">Apps Script</span>
    <span class="tag">Operations</span>
  </div>
</section>

<!-- PROJECTS -->
<section class="grid" id="projects">

  <div class="glass" onclick="openCard('blinkit')" data-aos="fade-up">
    <h3>Supervisor</h3>
    <p>Blinkit</p>
  </div>

  <div class="glass" onclick="openCard('dashboard')" data-aos="fade-up">
    <h3>Dashboard</h3>
    <p>Automation</p>
  </div>

</section>

<!-- CONTACT -->
<section class="contact" id="contact">
  <h2>Let's Build Something</h2>
  <input placeholder="Your Name">
  <input placeholder="Your Email">
  <textarea placeholder="Message"></textarea>
  <button class="primary">Send Message</button>
</section>

<!-- POPUP -->
<div id="overlay">
  <div class="popup" id="content"></div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
AOS.init({duration:900});

function openCard(type){

  let data="";

  if(type=="blinkit"){
    data = `
    <h2>Store Manager – Blinkit</h2>
    <p>
    ✔ Store operations<br>
    ✔ Inventory tracking<br>
    ✔ Team handling<br>
    ✔ Quick commerce execution
    </p>`;
  }

  if(type=="dashboard"){
    data = `
    <h2>Dashboard</h2>
    <p>Google Sheets automation project using Apps Script.</p>`;
  }

  document.getElementById("content").innerHTML = data;
  document.getElementById("overlay").style.display="flex";
}

document.getElementById("overlay").onclick = ()=>{
  document.getElementById("overlay").style.display="none";
}

function scrollToProjects(){
  document.getElementById("projects").scrollIntoView({behavior:"smooth"});
}

function scrollToContact(){
  document.getElementById("contact").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
