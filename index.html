<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surya Prasath Portfolio</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f2027;
  color: white;
}

.container {
  padding: 40px;
}

.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.hero img {
  width: 220px;
  border-radius: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  margin-top: 40px;
}

.card {
  background: #1c3b44;
  padding: 20px;
  border-radius: 15px;
  cursor: pointer;
}

.card:hover {
  background: #25525d;
}

button {
  padding: 10px 20px;
  border: none;
  background: #00c9a7;
  color: black;
  border-radius: 10px;
  cursor: pointer;
}

#overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup {
  background: white;
  color:black;
  padding: 20px;
  border-radius: 10px;
  width: 320px;
}
</style>

</head>

<body>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <div>
      <h2>From Idea to Execution</h2>
      <h1>SURYA PRASATH</h1>
      <p>Store Manager | Blinkit | Operations & Data</p>

      <p>📞 +91 6382799407</p>
      <p>📧 l.suryaprasath1@gmail.com</p>

      <button onclick="openPopup('about')">About Me</button>
    </div>

    <!-- 🔥 YOUR PHOTO HERE -->
    <img src="profile.jpg">
  </div>

  <!-- CARDS -->
  <div class="grid">

    <div class="card" onclick="openPopup('blinkit')">
      <h3>Blinkit</h3>
      <p>Store Manager</p>
    </div>

    <div class="card" onclick="openPopup('shadowfax')">
      <h3>Shadowfax</h3>
      <p>Team Leader</p>
    </div>

    <div class="card" onclick="openPopup('skills')">
      <h3>Skills</h3>
      <p>Operations & Management</p>
    </div>

  </div>

</div>

<!-- POPUP -->
<div id="overlay">
  <div class="popup" id="popupContent"></div>
</div>

<script>

function openPopup(type) {

  var content = "";

  if(type === "about") {
    content = `
      <h2>About Me</h2>
      <p>
      Dedicated logistics professional with 3+ years experience in supply chain,
      warehouse, and store operations. Skilled in inventory management,
      data tracking, and process improvement.
      </p>
    `;
  }

  if(type === "blinkit") {
    content = `
      <h2>Blinkit Experience</h2>
      <p>
      ✔ Managing daily store operations<br>
      ✔ Inventory & SKU tracking<br>
      ✔ Team handling & manpower control<br>
      ✔ Ensuring smooth order fulfillment<br>
      ✔ Working in quick commerce environment
      </p>
    `;
  }

  if(type === "shadowfax") {
    content = `
      <h2>Shadowfax</h2>
      <p>
      ✔ Managed delivery operations<br>
      ✔ Improved team performance<br>
      ✔ Ensured timely deliveries<br>
      ✔ Handled logistics operations
      </p>
    `;
  }

  if(type === "skills") {
    content = `
      <h2>Skills</h2>
      <p>
      ✔ Leadership & Team Handling<br>
      ✔ Inventory Management<br>
      ✔ Problem Solving<br>
      ✔ Operations Optimization<br>
      ✔ Data Analysis
      </p>
    `;
  }

  document.getElementById("popupContent").innerHTML = content;
  document.getElementById("overlay").style.display = "flex";
}

document.getElementById("overlay").onclick = function() {
  this.style.display = "none";
}

</script>

</body>
</html>
