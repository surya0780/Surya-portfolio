<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surya Prasath</title>

<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#021c1e,#0f3d3e);
  color:white;
}

/* HERO */
.hero {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:60px;
  flex-wrap:wrap;
}

.hero span { color:#00e6c3; }

.buttons button {
  margin:10px 10px 0 0;
  padding:12px 20px;
  border-radius:25px;
  cursor:pointer;
}

.primary {background:#00e6c3;border:none;}
.outline {border:1px solid #00e6c3;background:transparent;color:white;}

.hero img {
  width:240px;
  border-radius:20px;
  border:2px solid #00e6c3;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
  padding:40px;
}

/* GLASS */
.glass {
  background: rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  cursor:pointer;
}

/* CONTACT */
.contact {
  padding:40px;
}

input, textarea {
  width:100%;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button {
  padding:12px 20px;
  border-radius:20px;
  background:#00e6c3;
  border:none;
  cursor:pointer;
}

/* POPUP */
#overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup {
  width:400px;
  background: rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div>
    <h3>From Idea to <span>Execution</span></h3>
    <h1>SURYA PRASATH</h1>
    <p>Store Manager | Blinkit</p>

    <div class="buttons">
      <button onclick="scrollToProjects()">View Projects</button>
      <button onclick="scrollToContact()">Contact</button>
    </div>
  </div>

  <img src="profile.jpg">
</section>

<!-- PROJECTS -->
<section class="grid" id="projects">

  <div class="glass" onclick="openCard('blinkit')">
    <h3>Blinkit</h3>
    <p>Store Manager</p>
  </div>

  <div class="glass" onclick="openCard('shadowfax')">
    <h3>Shadowfax</h3>
    <p>Team Leader</p>
  </div>

</section>

<!-- CONTACT -->
<section id="contact" class="contact">

<h2>Contact Me</h2>

<form action="https://formspree.io/f/xqewovva" method="POST">

  <input type="text" name="name" placeholder="Your Name" required>

  <input type="email" name="email" placeholder="Your Email" required>

  <textarea name="message" placeholder="Your Message" required></textarea>

  <button type="submit">Send Message</button>

</form>

</section>

<!-- POPUP -->
<div id="overlay">
  <div class="popup" id="content"></div>
</div>

<script>
function openCard(type){

  let data = "";

  if(type=="blinkit"){
    data = `
    <h2>Store Manager – Blinkit</h2>
    <p>
    ✔ Store operations<br>
    ✔ Inventory tracking<br>
    ✔ Team handling<br>
    ✔ Quick commerce execution
    </p>`;
  }

  if(type=="shadowfax"){
    data = `
    <h2>Team Leader – Shadowfax</h2>
    <p>
    ✔ Managed delivery operations<br>
    ✔ Improved team performance<br>
    ✔ Ensured timely deliveries
    </p>`;
  }

  document.getElementById("content").innerHTML = data;
  document.getElementById("overlay").style.display="flex";
}

document.getElementById("overlay").onclick = function(){
  document.getElementById("overlay").style.display="none";
}

function scrollToProjects(){
  document.getElementById("projects").scrollIntoView({behavior:"smooth"});
}

function scrollToContact(){
  document.getElementById("contact").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
