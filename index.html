<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surya Prasath</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin:0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#021c1e,#0f3d3e);
  color:white;
}

/* HERO */
.hero {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:50px;
  flex-wrap:wrap;
}

.hero span { color:#00e6c3; }

.hero img {
  width:230px;
  border-radius:20px;
  border:3px solid #00e6c3;
}

/* BUTTONS */
.btns a {
  padding:12px 20px;
  margin:5px;
  border-radius:25px;
  text-decoration:none;
  color:white;
  display:inline-block;
  font-size:14px;
}

.projects { background:#00c9a7; }
.contact { background:#3b82f6; }
.resume { background:#f59e0b; }
.whatsapp { background:#25D366; }
.linkedin { background:#0077b5; }

/* CARDS */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  backdrop-filter: blur(10px);
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

/* POPUP */
.overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup {
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  padding:30px;
  border-radius:20px;
  width:320px;
  text-align:center;
  animation:zoom 0.3s ease;
  position:relative;
}

@keyframes zoom {
  from {transform:scale(0.5); opacity:0;}
  to {transform:scale(1); opacity:1;}
}

.close {
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:20px;
  color:#00e6c3;
}

/* CONTACT */
.contact-box {
  padding:40px;
}

input, textarea {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button {
  padding:12px 20px;
  background:#00e6c3;
  border:none;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div>
    <h3>From Idea to <span>Execution</span></h3>
    <h1>SURYA PRASATH</h1>
    <p>Store Manager | Blinkit</p>

    <div class="btns">
      <a href="#work" class="projects"><i class="fa fa-briefcase"></i> Work</a>
      <a href="#contact" class="contact"><i class="fa fa-envelope"></i> Contact</a>
      <a href="resume.docx" download class="resume"><i class="fa fa-download"></i> Resume</a>
      <a href="https://wa.me/916382799407" target="_blank" class="whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</a>
      <a href="https://www.linkedin.com/in/surya-prasath-65b79837b/" target="_blank" class="linkedin"><i class="fab fa-linkedin"></i> LinkedIn</a>
    </div>
  </div>

  <img src="profile.jpg">
</div>

<!-- WORK EXPERIENCE -->
<h2 style="padding-left:40px">Work Experience</h2>

<div class="grid" id="work">
  <div class="card" onclick="openPopup('blinkit')">
    <h3>Blinkit</h3>
    <p>Store Manager</p>
  </div>

  <div class="card" onclick="openPopup('shadowfax')">
    <h3>Shadowfax</h3>
    <p>Team Leader</p>
  </div>
</div>

<!-- POPUP -->
<div class="overlay" id="overlay">
  <div class="popup" id="popup">
    <span class="close" onclick="closePopup()">✖</span>
    <h2 id="title"></h2>
    <p id="desc"></p>
  </div>
</div>

<!-- CONTACT -->
<div class="contact-box" id="contact">
  <h2>Contact Me</h2>

  <form action="https://formspree.io/f/xqewovva" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Your Message"></textarea>
    <button type="submit">Send Message</button>
  </form>
</div>

<script>
function openPopup(type) {
  document.getElementById("overlay").style.display="flex";

  if(type==="blinkit"){
    document.getElementById("title").innerText="Blinkit";
    document.getElementById("desc").innerText="Managing store operations, inventory, manpower, and ensuring smooth quick commerce delivery.";
  }

  if(type==="shadowfax"){
    document.getElementById("title").innerText="Shadowfax";
    document.getElementById("desc").innerText="Handled delivery operations, rider management, and logistics coordination.";
  }
}

function closePopup(){
  document.getElementById("overlay").style.display="none";
}
</script>

</body>
</html>
